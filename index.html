<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <main>
        <div id="Titulo">
            <h1>Lista de Tareas Básicas</h1>
            <p>Esta lista sirve para recordar que cosas tengo que hacer diariamente:</p>
        </div>
        <div id="Formulario">
            <form id="Form">
                <label for="ftask">Tarea a realizar</label><br>
                <input type="text" id="ftask" name="ftask">
                <input type="submit" value="Enviar">
            </form>
        </div>
        <div class="Listas">
            <div class="Lista">
                <p>Lista de tareas por hacer</p>
                <ol class="Tareas1">
                    <li>
                        Comprar Comida 
                        <button class="boton-tareas">Realizado</button>
                    </li>
                    <li>
                        Comprar Bebidas 
                        <button class="boton-tareas">Realizado</button>
                    </li>
                    <li>
                        Arreglar el baño 
                        <button class="boton-tareas">Realizado</button>
                    </li>
                    <li>
                        Limpiar la cocina 
                        <button class="boton-tareas">Realizado</button>
                    </li>
                </ol>
            </div>
            <div class="Lista-completada">
                <p>Lista de tareas realizadas</p>
                <ol class="Tareas2">
                    <li>
                        Hacer la tarea 
                        <button class="boton-eliminar">Eliminar</button>
                    </li>
                </ol>
            </div>
        </div>
    </main>
    <script src="script.js"></script>
</body>
</html>
